<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sync Marathon Timer</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap');
        body { font-family: 'Montserrat', sans-serif; margin: 0; background: #fff; color: #555; }
        #setup-view { max-width: 800px; margin: 0 auto; text-align: center; padding-top: 30px; }
        h1 { font-weight: 300; letter-spacing: 4px; font-size: 28px; color: #333; margin-bottom: 30px; }
        .nav-container { border-bottom: 1px solid #ccc; margin-bottom: 50px; }
        .nav { display: flex; justify-content: center; gap: 30px; list-style: none; padding: 0; margin: 0; }
        .nav li { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #333; cursor: pointer; padding-bottom: 10px; }
        .nav li.active { border-bottom: 3px solid #555; margin-bottom: -2px; }
        .section-title { font-weight: 400; font-size: 14px; letter-spacing: 2px; color: #888; text-transform: uppercase; margin-bottom: 20px; margin-top: 40px; }
        .input-group { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .input-box { display: flex; flex-direction: column; align-items: center; }
        .input-box input { width: 60px; height: 35px; border: 1px solid #e0e0e0; border-radius: 4px; text-align: center; font-family: 'Montserrat'; font-size: 14px; }
        .input-box label { margin-top: 5px; font-size: 10px; color: #999; text-transform: uppercase; }
        select { font-family: 'Montserrat'; padding: 5px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 15px; }
        .btn-blue { background: #5a9bd4; color: white; border: none; border-radius: 4px; padding: 12px 40px; cursor: pointer; text-transform: uppercase; font-size: 11px; font-weight: 600; letter-spacing: 1px; transition: 0.2s; }
        .btn-blue:hover { background: #4a8bc4; }
        .status-msg { font-size: 11px; color: #2ecc71; margin-top: 10px; height: 15px; font-weight: 600; }
        
        #timer-view { display: none; height: 100vh; justify-content: center; align-items: center; background: transparent; }
        #countdown-display { font-size: 12vw; font-weight: 600; color: #ffffff; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>

<div id="setup-view">
    <h1>MARATHON TIMER</h1>
    <div class="nav-container">
        <ul class="nav">
            <li>ADD TIME</li><li class="active">SET TIMER</li><li id="copy-link" style="color:#5a9bd4">COPY SYNC LINK</li>
        </ul>
    </div>

    <div class="section-title">SET STARTING TIME:</div>
    <div class="input-group">
        <div class="input-box"><input type="number" id="h" value="15"><label>Hours</label></div>
        <div class="input-box"><input type="number" id="m" value="0"><label>Minutes</label></div>
        <div class="input-box"><input type="number" id="s" value="0"><label>Seconds</label></div>
    </div>
    <button class="btn-blue" id="btn-start">START NEW SESSION</button>
    <div id="msg-start" class="status-msg"></div>

    <div class="section-title">MODIFIER (+ / -):</div>
    <select id="action"><option value="add">Add Time (+)</option><option value="sub">Reduce Time (-)</option></select>
    <div class="input-group">
        <div class="input-box"><input type="number" id="modh" value="0"><label>Hours</label></div>
        <div class="input-box"><input type="number" id="modm" value="0"><label>Minutes</label></div>
        <div class="input-box"><input type="number" id="mods" value="0"><label>Seconds</label></div>
    </div>
    <button class="btn-blue" id="btn-update">UPDATE CLOUD TIMER</button>
    <div id="msg-update" class="status-msg"></div>
</div>

<div id="timer-view"><div id="countdown-display">00:00:00</div></div>

<script>
    // --- 1. PASTE YOUR CONFIG HERE ---
    const firebaseConfig = {
        apiKey: "AIzaSyBrer3en-IZymx-r6g4choU8kfKkfeQdNY",
        authDomain: "marathontimer.firebaseapp.com",
        databaseURL: "https://marathontimer-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "marathontimer",
        storageBucket: "marathontimermarathontimer.firebasestorage.app",
        messagingSenderId: "753172401546",
        appId: "1:753172401546:web:8ccd5552daa22c274c0c73"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let params = new URLSearchParams(window.location.search);
    let timerId = params.get('id');
    
    // Maintain a unique ID for this session
    if (!timerId) {
        timerId = Math.random().toString(36).substring(2, 10);
        window.history.replaceState({}, '', `?id=${timerId}`);
    }

    const isWidget = params.get('mode') === 'timer';
    const timerRef = db.ref('timers/' + timerId);

    if (isWidget) {
        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('timer-view').style.display = 'flex';
        document.body.style.background = 'transparent';
        
        timerRef.on('value', (snapshot) => {
            const endTime = snapshot.val();
            if (endTime) startCountdown(endTime);
        });
    } else {
        const showMsg = (id, text) => {
            const el = document.getElementById(id);
            el.innerText = text;
            setTimeout(() => el.innerText = "", 3000);
        };

        document.getElementById('btn-start').onclick = () => {
            const ms = (parseInt(document.getElementById('h').value)||0)*3600000 + 
                       (parseInt(document.getElementById('m').value)||0)*60000 + 
                       (parseInt(document.getElementById('s').value)||0)*1000;
            timerRef.set(Date.now() + ms)
                .then(() => showMsg("msg-start", "✓ Timer Reset Successfully!"))
                .catch(err => alert("Error: " + err.message));
        };

        document.getElementById('btn-update').onclick = () => {
            timerRef.once('value', (snapshot) => {
                let current = snapshot.val();
                if (!current || current < Date.now()) current = Date.now();
                
                const ms = (parseInt(document.getElementById('modh').value)||0)*3600000 + 
                           (parseInt(document.getElementById('modm').value)||0)*60000 + 
                           (parseInt(document.getElementById('mods').value)||0)*1000;
                
                const action = document.getElementById('action').value;
                const newTime = action === 'add' ? current + ms : current - ms;
                
                timerRef.set(newTime)
                    .then(() => {
                        showMsg("msg-update", "✓ Cloud Updated!");
                        document.getElementById('modh').value = 0;
                        document.getElementById('modm').value = 0;
                        document.getElementById('mods').value = 0;
                    });
            });
        };

        document.getElementById('copy-link').onclick = () => {
            const url = window.location.origin + window.location.pathname + `?id=${timerId}&mode=timer`;
            navigator.clipboard.writeText(url);
            showMsg("msg-update", "✓ Link Copied to Clipboard!");
        };
    }

    function startCountdown(endTime) {
        if (window.itv) clearInterval(window.itv);
        window.itv = setInterval(() => {
            const rem = endTime - Date.now();
            if (rem <= 0) { 
                document.getElementById('countdown-display').innerText = "00:00:00"; 
                return; 
            }
            const h = Math.floor(rem / 3600000).toString().padStart(2,'0');
            const m = Math.floor((rem % 3600000) / 60000).toString().padStart(2,'0');
            const s = Math.floor((rem % 60000) / 1000).toString().padStart(2,'0');
            document.getElementById('countdown-display').innerText = `${h}:${m}:${s}`;
        }, 1000);
    }
</script>
</body>
</html>
