<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sync Marathon Timer</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap');
        body { font-family: 'Montserrat', sans-serif; margin: 0; background: #fff; color: #555; }
        #setup-view { max-width: 800px; margin: 0 auto; text-align: center; padding-top: 30px; }
        h1 { font-weight: 300; letter-spacing: 4px; font-size: 28px; color: #333; }
        .nav-container { border-bottom: 1px solid #ccc; margin-bottom: 50px; }
        .nav { display: flex; justify-content: center; gap: 30px; list-style: none; padding: 0; }
        .nav li { font-size: 11px; font-weight: 600; text-transform: uppercase; cursor: pointer; padding-bottom: 10px; }
        .nav li.active { border-bottom: 3px solid #555; }
        .section-title { font-weight: 400; font-size: 14px; letter-spacing: 2px; color: #888; text-transform: uppercase; margin-bottom: 20px; }
        .input-group { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .input-box input { width: 60px; height: 35px; border: 1px solid #e0e0e0; border-radius: 4px; text-align: center; }
        .btn-blue { background: #5a9bd4; color: white; border: none; border-radius: 4px; padding: 12px 40px; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        
        /* Timer View (Transparent for OBS) */
        #timer-view { display: none; height: 100vh; justify-content: center; align-items: center; background: transparent; }
        #countdown-display { font-size: 10vw; font-weight: 600; color: #ffffff; text-shadow: 2px 2px 8px rgba(0,0,0,0.8); font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>

<div id="setup-view">
    <h1>MARATHON TIMER</h1>
    <div class="nav-container"><ul class="nav"><li>ADD TIME</li><li class="active">SET TIMER</li><li id="copy-link" style="color:#5a9bd4">COPY SYNC LINK</li></ul></div>
    <div class="section-title">SET STARTING TIME</div>
    <div class="input-group">
        <input type="number" id="h" value="15"> <input type="number" id="m" value="0"> <input type="number" id="s" value="0">
    </div>
    <button class="btn-blue" id="btn-start">START NEW SESSION</button>
    <div class="section-title" style="margin-top:40px">MODIFIER (+ / -)</div>
    <select id="action"><option value="add">Add</option><option value="sub">Reduce</option></select>
    <div class="input-group">
        <input type="number" id="modh" value="0"> <input type="number" id="modm" value="0"> <input type="number" id="mods" value="0">
    </div>
    <button class="btn-blue" id="btn-update">UPDATE CLOUD TIMER</button>
</div>

<div id="timer-view"><div id="countdown-display">00:00:00</div></div>

<script>
    // --- 1. PASTE YOUR FIREBASE CONFIG HERE ---
    const firebaseConfig = {
        apiKey: "AIzaSyBrer3en-IZymx-r6g4choU8kfKkfeQdNY",
        authDomain: "marathontimer.firebaseapp.com",
        databaseURL: "https://marathontimer-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "marathontimer",
        storageBucket: "marathontimermarathontimer.firebasestorage.app",
        messagingSenderId: "753172401546",
        appId: "1:753172401546:web:8ccd5552daa22c274c0c73"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- 2. GET UNIQUE ID FROM URL ---
    // If no ID in URL, it generates one (e.g., yourfile.html?id=12345)
    let params = new URLSearchParams(window.location.search);
    let timerId = params.get('id');
    if (!timerId) {
        timerId = Math.random().toString(36).substring(2, 10);
        window.history.replaceState({}, '', `?id=${timerId}`);
    }

    const isWidget = params.get('mode') === 'timer';
    const timerRef = db.ref('timers/' + timerId);

    if (isWidget) {
        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('timer-view').style.display = 'flex';
        document.body.style.background = 'transparent';
        
        // SYNC FROM CLOUD
        timerRef.on('value', (snapshot) => {
            const endTime = snapshot.val();
            startCountdown(endTime);
        });
    } else {
        // SETUP MODE
        document.getElementById('btn-start').onclick = () => {
            const ms = (document.getElementById('h').value * 3600000) + (document.getElementById('m').value * 60000) + (document.getElementById('s').value * 1000);
            timerRef.set(Date.now() + ms);
        };

        document.getElementById('btn-update').onclick = () => {
            timerRef.once('value', (snapshot) => {
                let current = snapshot.val() || Date.now();
                const ms = (document.getElementById('modh').value * 3600000) + (document.getElementById('modm').value * 60000) + (document.getElementById('mods').value * 1000);
                const action = document.getElementById('action').value;
                timerRef.set(action === 'add' ? current + ms : current - ms);
            });
        };

        document.getElementById('copy-link').onclick = () => {
            const url = window.location.href.split('&')[0] + '&mode=timer';
            navigator.clipboard.writeText(url);
            alert("OBS Link Copied! Paste this into OBS Browser Source.");
        };
    }

    function startCountdown(endTime) {
        clearInterval(window.itv);
        window.itv = setInterval(() => {
            const rem = endTime - Date.now();
            if (rem <= 0) { document.getElementById('countdown-display').innerText = "00:00:00"; return; }
            const h = Math.floor(rem / 3600000).toString().padStart(2,'0');
            const m = Math.floor((rem % 3600000) / 60000).toString().padStart(2,'0');
            const s = Math.floor((rem % 60000) / 1000).toString().padStart(2,'0');
            document.getElementById('countdown-display').innerText = `${h}:${m}:${s}`;
        }, 1000);
    }
</script>
</body>
</html>
